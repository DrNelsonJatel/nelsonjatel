<!--
  nelsonjatel.com  ·  Header Code Injection  ·  v1
  Paste into: Settings  >  Advanced  >  Code Injection  >  HEADER
  ------------------------------------------------------------
  Loads the three brand typefaces and sets site-wide meta / Open Graph.
  Instrument Serif, Instrument Sans, and IBM Plex Mono are all on
  Google Fonts, so no self-hosting is needed.
-->

<!-- Typefaces -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap">

<!-- Open Graph defaults (per-page titles/descriptions set in each page's SEO panel) -->
<meta property="og:site_name" content="Dr. Nelson Jatel">
<meta property="og:type" content="website">
<meta property="og:image" content="https://nelsonjatel.com/s/JATEL_EndCard_v1_20260619.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0E2A38">

<!--
  OG image note: upload JATEL_EndCard_v1_20260619.png via
  Settings > Files, then replace the /s/ URL above with the path
  Squarespace gives you. The square card is for profile avatars.
-->
