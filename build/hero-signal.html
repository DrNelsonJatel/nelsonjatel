<!--
  Hero "traced signal" motif for nelsonjatel.com
  ------------------------------------------------
  Hydrographic Signal: a cool scattered node-field with a single amber line
  traced out of it. Draws on once on load; respects prefers-reduced-motion.

  WHERE THIS GOES (Squarespace 7.1, Business+):
    Option A (recommended): add a Code Block to the hero section and paste
    this whole file in. The SVG scales to the block width.
    Option B: paste into a Code section if you want it full-bleed behind text.

  FALLBACK (Personal plan, no code blocks): use the static image instead:
    files/JATEL_EndCard_v1_20260619.png cropped to the line only, set as the
    hero section background. No animation, same composition.

  Self-contained: scoped styles, no external dependencies.
-->
<div class="nj-hero-signal" role="img"
     aria-label="A scattered field of cool data points with a single amber line traced through it.">
  <svg viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet" focusable="false">
    <defs>
      <!-- soft emitted glow for the signal line and its nodes -->
      <filter id="njGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge>
          <feMergeNode in="b"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <linearGradient id="njLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"   stop-color="#F3B24E" stop-opacity="0.65"/>
        <stop offset="0.5" stop-color="#F3B24E" stop-opacity="1"/>
        <stop offset="1"   stop-color="#FFD27A" stop-opacity="1"/>
      </linearGradient>
    </defs>

    <!-- NOISE: cool, dim scatter. Suspended in the upper register. -->
    <g class="nj-scatter" fill="#4A6E7C">
      <circle cx="95"  cy="120" r="2.0" opacity="0.30"/>
      <circle cx="130" cy="170" r="1.4" opacity="0.22"/>
      <circle cx="150" cy="95"  r="2.6" opacity="0.28"/>
      <circle cx="185" cy="150" r="1.6" opacity="0.20"/>
      <circle cx="210" cy="205" r="2.2" opacity="0.26"/>
      <circle cx="240" cy="110" r="1.3" opacity="0.18"/>
      <circle cx="270" cy="185" r="2.4" opacity="0.24"/>
      <circle cx="300" cy="140" r="1.5" opacity="0.20"/>
      <circle cx="120" cy="225" r="1.8" opacity="0.22"/>
      <circle cx="175" cy="245" r="2.1" opacity="0.25"/>
      <circle cx="345" cy="95"  r="1.4" opacity="0.18"/>
      <circle cx="390" cy="165" r="2.0" opacity="0.22"/>
      <circle cx="430" cy="120" r="1.5" opacity="0.18"/>
      <circle cx="500" cy="160" r="1.7" opacity="0.20"/>
      <circle cx="560" cy="105" r="1.3" opacity="0.16"/>
      <circle cx="640" cy="180" r="1.8" opacity="0.20"/>
      <circle cx="700" cy="120" r="1.4" opacity="0.16"/>
      <circle cx="780" cy="165" r="1.6" opacity="0.18"/>
      <circle cx="860" cy="100" r="1.3" opacity="0.15"/>
      <circle cx="940" cy="175" r="1.5" opacity="0.16"/>
      <circle cx="1020" cy="115" r="1.3" opacity="0.14"/>
      <circle cx="1100" cy="170" r="1.4" opacity="0.15"/>
    </g>

    <!-- SIGNAL: one line, traced out of the noise, left to right. -->
    <path class="nj-line"
          d="M 70 155
             C 100 155, 120 240, 160 240
             S 250 120, 330 120
             S 430 205, 470 205
             S 560 135, 600 135
             S 700 175, 740 172
             S 840 120, 880 122
             S 980 158, 1010 156
             S 1110 150, 1140 150"
          fill="none" stroke="url(#njLine)" stroke-width="2.4"
          stroke-linecap="round" filter="url(#njGlow)" pathLength="1"/>

    <!-- the few nodes the line claims -->
    <g class="nj-nodes" fill="#FFD27A" filter="url(#njGlow)">
      <circle cx="160"  cy="240" r="3.2"/>
      <circle cx="470"  cy="205" r="2.6"/>
      <circle cx="600"  cy="135" r="3.0"/>
      <circle cx="880"  cy="122" r="3.4"/>
      <circle cx="1140" cy="150" r="4.0"/>
    </g>
  </svg>
</div>

<style>
  .nj-hero-signal{ width:100%; max-width:1200px; margin:0 auto; line-height:0; }
  .nj-hero-signal svg{ width:100%; height:auto; display:block; overflow:visible; }

  /* draw-on: dash the normalised path (pathLength=1) then retract the offset */
  .nj-hero-signal .nj-line{
    stroke-dasharray:1; stroke-dashoffset:1;
    animation:njDraw 2.6s cubic-bezier(.4,0,.2,1) .2s forwards;
  }
  .nj-hero-signal .nj-nodes circle{
    opacity:0; animation:njNode .6s ease-out forwards;
  }
  /* stagger the nodes to appear as the line reaches them */
  .nj-hero-signal .nj-nodes circle:nth-child(1){ animation-delay:.9s; }
  .nj-hero-signal .nj-nodes circle:nth-child(2){ animation-delay:1.5s; }
  .nj-hero-signal .nj-nodes circle:nth-child(3){ animation-delay:1.9s; }
  .nj-hero-signal .nj-nodes circle:nth-child(4){ animation-delay:2.4s; }
  .nj-hero-signal .nj-nodes circle:nth-child(5){ animation-delay:2.9s; }

  @keyframes njDraw{ to{ stroke-dashoffset:0; } }
  @keyframes njNode{ to{ opacity:1; } }

  /* accessibility: no motion means the artefact is simply already resolved */
  @media (prefers-reduced-motion: reduce){
    .nj-hero-signal .nj-line{ animation:none; stroke-dashoffset:0; }
    .nj-hero-signal .nj-nodes circle{ animation:none; opacity:1; }
  }
</style>
